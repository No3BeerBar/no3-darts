# Copy to config.yaml and edit for your board.

# Where No3 Darts is running (local LAN or Railway URL)
no3_api_url: "https://no3-darts-production.up.railway.app"
camera_api_key: ""          # same as CAMERA_API_KEY if set on the server
room_id: "Board 1"

# Debounce: ignore further detections for N ms after a hit
debounce_ms: 1200

# Minimum confidence (0–1) before posting a dart
min_confidence: 0.30

# --- Sensitivity (LOWER thresholds = more detections) ---
# Intensity threshold 0–255
motion_threshold: 8

# New pixels on board vs empty background
min_motion_pixels: 25

# Frame-to-frame "still moving" cutoff (hand withdrawing)
settle_motion_pixels: 80

# Frame-to-frame spike that starts a cycle even if bg adapted
spike_motion_pixels: 150

# Contour size for dart blob
min_blob_area: 10
max_blob_area: 80000

# Quiet frames before measuring tip
settle_frames: 3

# Measure tip after this many frames even if still a bit noisy
max_pending_frames: 25

cameras:
  - id: cam0
    source: 0
    enabled: true
    calibration: "./calib/cam0.json"
  - id: cam1
    source: 1
    enabled: true
    calibration: "./calib/cam1.json"
  - id: cam2
    source: 2
    enabled: true
    calibration: "./calib/cam2.json"

# Show OpenCV preview + binary motion mask windows
preview: true
show_mask: true

# true = detect only, do not POST
dry_run: false
