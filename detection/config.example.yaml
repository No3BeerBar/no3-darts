# Copy to config.yaml and edit for your board.

# Site ROOT only — https, no /tv /api /play
no3_api_url: "https://no3-darts-production.up.railway.app"
camera_api_key: ""
room_id: "Board 1"

# Debounce between posted darts (ms)
debounce_ms: 1800

# Only post when confidence ≥ this (higher = fewer wrong scores)
min_confidence: 0.55

# Same segment must be seen this many times before POST (1 = faster, noisier)
confirm_hits: 2
confirm_window_ms: 900

# Don't re-score a tip this close to the last one (pixels)
min_tip_separation_px: 18

# --- Motion sensitivity ---
motion_threshold: 10
min_motion_pixels: 35
settle_motion_pixels: 100
spike_motion_pixels: 200
min_blob_area: 20
max_blob_area: 12000
settle_frames: 5
max_pending_frames: 30

# --- Takeout / hands (next visit) ---
# Frame-to-frame pixels that mean "arm/hand in front of board"
hand_motion_pixels: 2500
# Board looks empty vs last B snapshot
empty_board_fg_max: 80
takeout_quiet_frames: 8
takeout_min_ms: 400

cameras:
  - id: cam0
    source: 0
    enabled: true
    calibration: "./calib/cam0.json"
  - id: cam1
    source: 1
    enabled: true
    calibration: "./calib/cam1.json"
  - id: cam2
    source: 2
    enabled: true
    calibration: "./calib/cam2.json"

preview: true
show_mask: true
dry_run: false
